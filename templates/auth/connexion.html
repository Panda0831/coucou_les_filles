
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --rose:        #C4728A;
    --rose-light:  #F5E6EA;
    --rose-mid:    #E8C5CF;
    --rose-dark:   #8B4A5C;
    --sage:        #7A9E8E;
    --sage-light:  #E8F2EE;
    --cream:       #FBF7F4;
    --ink:         #2A2320;
    --muted:       #7A6E6A;
    --line:        #EBE3DF;
    --white:       #FFFFFF;
    --ff-display:  'Cormorant Garamond', Georgia, serif;
    --ff-body:     'DM Sans', system-ui, sans-serif;
  }

  .cx-wrap {
    font-family: var(--ff-body);
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .cx-panel {
    width: 100%;
    max-width: 420px;
    animation: fadeUp .45s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Logo mark ── */
  .cx-mark {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.75rem;
  }

  .cx-mark__circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--rose-light);
    border: 1.5px solid var(--rose-mid);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cx-mark__circle svg {
    width: 22px;
    height: 22px;
  }

  /* ── Heading ── */
  .cx-heading {
    text-align: center;
    margin-bottom: 2.25rem;
  }

  .cx-heading__title {
    font-family: var(--ff-display);
    font-size: 2rem;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 0.45rem;
  }

  .cx-heading__title em {
    font-style: italic;
    color: var(--rose-dark);
  }

  .cx-heading__sub {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ── Error banner ── */
  .cx-error {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: #FEF2F2;
    border: 1px solid #FCA5A5;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
    font-size: 13px;
    color: #991B1B;
    animation: shake .35s ease;
  }

  .cx-error svg { flex-shrink: 0; margin-top: 1px; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-5px); }
    40%,80% { transform: translateX(5px); }
  }

  /* ── Form ── */
  .cx-form {
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
  }

  .cx-field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .cx-field__label {
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .cx-field__input-wrap {
    position: relative;
  }

  .cx-field__icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    transition: color .2s;
    display: flex;
    align-items: center;
  }

  .cx-field__icon svg { width: 16px; height: 16px; }

  .cx-field__input-wrap:focus-within .cx-field__icon {
    color: var(--rose);
  }

  .cx-field input {
    width: 100%;
    height: 46px;
    padding: 0 1rem 0 2.6rem;
    font-family: var(--ff-body);
    font-size: 14px;
    color: var(--ink);
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 10px;
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
    -webkit-appearance: none;
  }

  .cx-field input::placeholder { color: #C5BBB7; }

  .cx-field input:hover  { border-color: var(--rose-mid); }

  .cx-field input:focus  {
    border-color: var(--rose);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(196,114,138,.11);
  }

  /* ── Submit ── */
  .cx-submit {
    margin-top: .35rem;
    width: 100%;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--rose);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--ff-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s, transform .1s;
    letter-spacing: .02em;
  }

  .cx-submit:hover  { background: var(--rose-dark); }
  .cx-submit:active { transform: scale(.98); }

  .cx-submit svg { width: 15px; height: 15px; transition: transform .2s; }
  .cx-submit:hover svg { transform: translateX(3px); }

  /* ── Divider ── */
  .cx-divider {
    display: flex;
    align-items: center;
    gap: .75rem;
    margin-top: 1.5rem;
  }

  .cx-divider::before,
  .cx-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .cx-divider span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ── Footer ── */
  .cx-footer {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.6;
  }

  .cx-footer a {
    color: var(--rose-dark);
    font-weight: 500;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .2s;
  }

  .cx-footer a:hover { border-color: var(--rose-dark); }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .cx-heading__title { font-size: 1.7rem; }
    .cx-panel { max-width: 100%; }
  }
</style>

<div class="cx-wrap">
  <div class="cx-panel">

    <!-- Mark -->
    <div class="cx-mark">
      <div class="cx-mark__circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C4728A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <div class="cx-heading">
      <h1 class="cx-heading__title">Ravi de vous <em>revoir</em></h1>
      <p class="cx-heading__sub">Accédez à votre espace maternité</p>
    </div>

    <!-- Error -->
    {% if error %}
    <div class="cx-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Form -->
    <form method="post" action="{% url 'users:connexion' %}" class="cx-form">
      {% csrf_token %}

      <div class="field cx-field">
        <label class="cx-field__label" for="username">Nom d'utilisateur</label>
        <div class="cx-field__input-wrap">
          <span class="cx-field__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text" id="username" name="username" class="cool-input" placeholder="Votre pseudo" required autocomplete="username" />
        </div>
      </div>

      <div class="field cx-field">
        <label class="cx-field__label" for="password">Mot de passe</label>
        <div class="cx-field__input-wrap password-wrap">
          <span class="cx-field__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" name="password" class="cool-input" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="password-toggle" aria-label="Afficher le mot de passe" style="right: 14px; top: 50%; transform: translateY(-50%); position: absolute; background: none; border: none; color: var(--muted); cursor: pointer;">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="cx-submit">
        Se connecter
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </form>

    <div class="cx-divider"><span>ou</span></div>

    <p class="cx-footer">
      Pas encore membre ?
      <a href="{% url 'users:inscription' %}">Créer un compte</a>
    </p>

  </div>
</div>

<script>
  // Password Toggle
  document.querySelectorAll('.password-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = btn.previousElementSibling;
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      btn.querySelector('i').className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    });
  });
</script>
