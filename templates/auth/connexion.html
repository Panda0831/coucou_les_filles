<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --rose: #C4728A;
  --rose-dark: #8B4A5C;
  --rose-light: #F5E6EA;
  --line: #EBE3DF;
  --muted: #7A6E6A;
  --ink: #2A2320;
  --cream: #FBF7F4;
  --white: #fff;

  --ff-display: 'Cormorant Garamond', serif;
  --ff-body: 'DM Sans', sans-serif;
}

/* GLOBAL */
body {
  font-family: var(--ff-body);
  background: linear-gradient(135deg, #fff7f8, #f7f2ff);
  min-height: 100vh;
}

/* LAYOUT */
.cx-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

.cx-panel {
  width: 100%;
  max-width: 440px;
  animation: fadeUp .45s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* LOGO */
.cx-mark {
  display: flex;
  justify-content: center;
  margin-bottom: 1.5rem;
}

.cx-mark__circle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--rose-light);
  border: 1px solid #e8c5cf;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 25px rgba(196,114,138,0.15);
}

/* TITRE */
.cx-heading {
  text-align: center;
  margin-bottom: 2rem;
}

.cx-heading__title {
  font-family: var(--ff-display);
  font-size: 2rem;
  font-weight: 400;
  color: var(--ink);
}

.cx-heading__title em {
  color: var(--rose-dark);
  font-style: italic;
}

.cx-heading__sub {
  font-size: 14px;
  color: var(--muted);
  margin-top: .4rem;
}

/* ERROR */
.cx-error {
  display: flex;
  gap: 10px;
  padding: .9rem 1rem;
  background: #fff1f1;
  border: 1px solid #ffb3b3;
  border-radius: 12px;
  color: #a30000;
  font-size: 13px;
  margin-bottom: 1.2rem;
}

/* FORM */
.cx-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* FIELD */
.cx-field {
  display: flex;
  flex-direction: column;
  gap: .4rem;
}

.cx-label {
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  font-weight: 500;
}

/* INPUT */
.cx-input-wrap {
  position: relative;
}

.cx-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
}

.cx-icon svg {
  width: 16px;
  height: 16px;
}

.cx-input {
  width: 100%;
  height: 48px;
  padding: 0 1rem 0 2.6rem;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: var(--cream);
  font-size: 14px;
  transition: .2s;
  outline: none;
}

.cx-input:focus {
  border-color: var(--rose);
  background: white;
  box-shadow: 0 0 0 4px rgba(196,114,138,0.12);
}

/* PASSWORD TOGGLE */
.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
}

/* BUTTON */
.cx-submit {
  margin-top: .5rem;
  height: 48px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--rose), var(--rose-dark));
  color: white;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: .2s;
}

.cx-submit:hover {
  transform: translateY(-2px);
}

.cx-submit svg {
  width: 16px;
  height: 16px;
}

/* DIVIDER */
.cx-divider {
  display: flex;
  align-items: center;
  gap: .8rem;
  margin: 1.5rem 0;
}

.cx-divider::before,
.cx-divider::after {
  content: "";
  height: 1px;
  flex: 1;
  background: var(--line);
}

.cx-divider span {
  font-size: 11px;
  color: var(--muted);
}

/* FOOTER */
.cx-footer {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
}

.cx-footer a {
  color: var(--rose-dark);
  font-weight: 500;
  text-decoration: none;
}

/* RESPONSIVE */
@media (max-width: 480px) {
  .cx-heading__title {
    font-size: 1.7rem;
  }
}
</style>

<div class="cx-wrap">
  <div class="cx-panel">

    <!-- logo -->
    <div class="cx-mark">
      <div class="cx-mark__circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C4728A" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21l7.78-7.78a5.5 5.5 0 0 0 0-7.61z"/>
        </svg>
      </div>
    </div>

    <!-- title -->
    <div class="cx-heading">
      <h1 class="cx-heading__title">Ravi de vous <em>revoir</em></h1>
      <p class="cx-heading__sub">Accédez à votre espace maternité</p>
    </div>

    {% if error %}
    <div class="cx-error">
      ⚠ {{ error }}
    </div>
    {% endif %}

    <!-- form -->
    <form method="post" action="{% url 'users:connexion' %}" class="cx-form">
      {% csrf_token %}

      <!-- username -->
      <div class="cx-field">
        <label class="cx-label">Nom d'utilisateur</label>
        <div class="cx-input-wrap">
          <span class="cx-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="7" r="4"/>
              <path d="M5.5 21a8.38 8.38 0 0 1 13 0"/>
            </svg>
          </span>
          <input class="cx-input" name="username" type="text" required>
        </div>
      </div>

      <!-- password -->
      <div class="cx-field">
        <label class="cx-label">Mot de passe</label>
        <div class="cx-input-wrap">
          <span class="cx-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>

          <input class="cx-input" id="password" name="password" type="password" required>

          <button type="button" class="password-toggle" onclick="
            const i=document.getElementById('password');
            i.type = i.type==='password' ? 'text':'password';
          ">
            👁
          </button>
        </div>
      </div>

      <button class="cx-submit" type="submit">
        Se connecter
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14"/>
          <path d="M12 5l7 7-7 7"/>
        </svg>
      </button>
    </form>

    <div class="cx-divider"><span>ou</span></div>

    <p class="cx-footer">
      Pas encore membre ?
      <a href="{% url 'users:inscription' %}">Créer un compte</a>
    </p>

  </div>
</div>
