
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="max-w-md w-full bg-[var(--surface)] rounded-[32px] shadow-2xl p-8 md:p-10 border border-[var(--line)] transition-colors duration-350">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-[var(--ink)] text-[var(--paper)] rounded-3xl shadow-xl mb-6 transform rotate-3 hover:rotate-0 transition-transform duration-300">
                <i class="fas fa-fingerprint text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-[var(--ink)] tracking-tight font-serif-display">Ravi de vous revoir</h1>
            <p class="text-[var(--muted)] text-sm mt-2">Accédez à votre espace en un clin d'œil</p>
        </div>

        {% if error %}
            <div class="mb-6 p-4 rounded-2xl bg-red-50 border border-red-100 text-red-600 text-sm font-medium flex items-center animate-shake">
                <i class="fas fa-circle-exclamation mr-3"></i>
                {{ error }}
            </div>
        {% endif %}

        <form method="post" action="{% url 'users:connexion' %}" class="space-y-6">
            {% csrf_token %}
            
            <div class="flex flex-col space-y-2">
                <label for="username" class="text-xs font-bold text-[var(--muted)] uppercase tracking-widest ml-1">
                    Nom d'utilisateur
                </label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-[var(--muted)] group-focus-within:text-[var(--accent)] transition-colors">
                        <i class="fas fa-user text-sm"></i>
                    </div>
                    <input type="text" name="username" id="username" required placeholder="Votre pseudo"
                           class="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-[var(--paper)] border-2 border-transparent ring-1 ring-[var(--line)] focus:ring-[var(--accent)] focus:border-transparent outline-none transition-all text-[var(--ink)] text-sm placeholder-[var(--muted)]/50">
                </div>
            </div>

            <div class="flex flex-col space-y-2">
                <label for="password" class="text-xs font-bold text-[var(--muted)] uppercase tracking-widest ml-1">
                    Mot de passe
                </label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-[var(--muted)] group-focus-within:text-[var(--accent)] transition-colors">
                        <i class="fas fa-key text-sm"></i>
                    </div>
                    <input type="password" name="password" id="password" required placeholder="••••••••"
                           class="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-[var(--paper)] border-2 border-transparent ring-1 ring-[var(--line)] focus:ring-[var(--accent)] focus:border-transparent outline-none transition-all text-[var(--ink)] text-sm placeholder-[var(--muted)]/50">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-[var(--ink)] hover:bg-[var(--accent)] text-[var(--paper)] font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg hover:shadow-[var(--accent)]/20 active:scale-[0.98] flex items-center justify-center gap-2 group">
                    <span>Se connecter</span>
                    <i class="fas fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>
        </form>

        <div class="mt-10 pt-8 border-t border-[var(--line)] text-center">
            <p class="text-[var(--muted)] text-sm">
                Pas encore membre ? 
                <a href="{% url 'users:inscription' %}" class="text-[var(--ink)] font-bold hover:text-[var(--accent)] transition-colors underline-offset-4 hover:underline">Créer un compte gratuitement</a>
            </p>
        </div>
    </div>
</div>

<style>
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }
    .animate-shake { animation: shake 0.4s ease-in-out; }
    .font-serif-display { font-family: 'DM Serif Display', serif; }
</style>
{% endblock %}
