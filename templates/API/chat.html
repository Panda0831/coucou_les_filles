{% extends "Base/base.html" %}
{% block content %}
  <body>
    <main>
      <h2>Discuter avec l'IA de Ryan</h2>
      <div id="chat-box"></div>
      <input type="text" id="user-input" placeholder="Tapez votre message ici..." />
      <button id="send-btn" onclick="sendMessage()">Envoyer</button>
    </main>

 

    <a href="#" class="chat-bubble" title="Discuter avec l'IA">
      <i class="fas fa-robot"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function toggleMenu() {
        document.getElementById("nav-links").classList.toggle("open");
      }

      async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = inputField.value;
        if (!message) return;
        chatBox.innerHTML += `<p class="user-msg"><b>Vous:</b> ${message}</p>`;
        inputField.value = "";
        try {
          const response = await fetch("/api/chat/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
          });
          const data = await response.json();
          if (data.reply) {
            chatBox.innerHTML += `<p class="ai-msg"><b>IA:</b> ${data.reply}</p>`;
          } else {
            chatBox.innerHTML += `<p class="ai-msg" style="color:red;">Erreur: ${data.error}</p>`;
          }
        } catch (error) {
          console.error("Erreur Fetch:", error);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    </script>
  </body>
{% endblock %}
